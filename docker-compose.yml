version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tms_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    networks:
      - tms_network
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: tms_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./.docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tms_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: tms_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_translation
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: laravel
    ports:
      - "3306:3306"
    volumes:
      - tms_mysql_data:/var/lib/mysql
    networks:
      - tms_network

  redis:
    image: redis:alpine
    container_name: tms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - tms_network

networks:
  tms_network:
    driver: bridge

volumes:
  tms_mysql_data:
    driver: local